<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano</title>
    <link rel="icon" href="../favicon.ico">
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>

<body>
    <div class="piano">
        <div class="white-key C4 left-key"><text>A</text></div>
        <div class="black-key Db4"><text>W</text></div>
        <div class="white-key D4"><text>S</text></div>
        <div class="black-key Eb4"><text>E</text></div>
        <div class="white-key E4"><text>D</text></div>
        <div class="white-key F4"><text>F</text></div>
        <div class="black-key Gb4"><text>T</text></div>
        <div class="white-key G4"><text>G</text></div>
        <div class="black-key Ab4"><text>Y</text></div>
        <div class="white-key A4"><text>H</text></div>
        <div class="black-key Bb4"><text>U</text></div>
        <div class="white-key B4"><text>J</text></div>
        <div class="white-key C5"><text>K</text></div>
        <div class="black-key Db5"><text>O</text></div>
        <div class="white-key D5"><text>L</text></div>
        <div class="black-key Eb5"><text>P</text></div>
        <div class="white-key E5 right-key"><text>Ñ</text></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
